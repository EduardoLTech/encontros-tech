apiVersion: v1
kind: Namespace
metadata:
  name: encontros-tech
---
apiVersion: v1
kind: Secret
metadata:
  name: encontros-tech-secret
  namespace: encontros-tech
type: Opaque
stringData:
  POSTGRES_USER: encontros_tech
  POSTGRES_PASSWORD: encontros_tech
  POSTGRES_DB: encontros_tech
  DATABASE_URL: postgresql://encontros_tech:encontros_tech@postgres:5432/encontros_tech
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: encontros-tech-config
  namespace: encontros-tech
data:
  APP_TITLE: "Encontros Tech"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "colored"
  SERVICE_NAME: "encontros-tech"
  SERVICE_VERSION: "1.0.0"
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: encontros-tech
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: encontros-tech
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: encontros-tech-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: encontros-tech-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: encontros-tech-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "encontros_tech", "-d", "encontros_tech"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "encontros_tech", "-d", "encontros_tech"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: encontros-tech
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: encontros-tech
  namespace: encontros-tech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: encontros-tech
  template:
    metadata:
      labels:
        app: encontros-tech
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: encontros-tech
          image: teclinux/encontros-tech
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: encontros-tech-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: encontros-tech-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: encontros-tech
  namespace: encontros-tech
spec:
  type: NodePort
  selector:
    app: encontros-tech
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
