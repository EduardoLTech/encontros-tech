services:
  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: teclinux/encontros-tech
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-encontros_tech}:${POSTGRES_PASSWORD:-encontros_tech}@db:5432/${POSTGRES_DB:-encontros_tech}
      APP_TITLE: ${APP_TITLE:-Encontros Tech}
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-colored}
      SERVICE_NAME: ${SERVICE_NAME:-encontros-tech}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-encontros_tech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-encontros_tech}
      POSTGRES_DB: ${POSTGRES_DB:-encontros_tech}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-encontros_tech} -d ${POSTGRES_DB:-encontros_tech}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
